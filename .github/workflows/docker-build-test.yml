name: docker-build-test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "renovate.json"
      - ".github/ISSUE_TEMPLATE/**"
      - "PULL_REQUEST_TEMPLATE.md"
      - "docs/**"

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    # Add timeout to prevent hung builds
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Improved caching strategy with versioning
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Add vulnerability scanning
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/thezak48/comps:edge"
          format: "sarif"
          output: "trivy-results.sarif"

      # Generate SBOM
      - uses: anchore/sbom-action@v0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/thezak48/comps
            thezak48/comps
          flavor: |
            latest=${{ github.ref_type == 'tag' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=develop
            type=ref,event=pr
            type=sha,format=long
            type=sha

      - name: Docker build (simple)
        run: |
          # Build a single-arch image using the standard docker CLI to avoid buildx manifest/export issues.
          docker build --progress=plain -t comps:ci-test \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION="${{ steps.meta.outputs.tags }}" .

      - name: List local images
        run: |
          docker images --format 'table {{.Repository}}:{{.Tag}}\t{{.ID}}\t{{.Size}}'

      - name: Smoke test - run image and check --help or health endpoint
        run: |
          set -o pipefail
          # Find the built image. Adjust pattern if you tag explicitly.
          # Prefer explicit tag we just built
          IMAGE=comps:ci-test
          if [ -z "$IMAGE" ] || [ "$(docker images -q $IMAGE)" = "" ]; then
            echo "Built tag comps:ci-test not found, falling back to search"
            IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | grep -E 'comps|thezak48/comps|ghcr.io/thezak48/comps' | awk '{print $1}' | head -n1 || true)
          fi
          if [ -z "$IMAGE" ]; then
            echo "No image found by expected names, falling back to first local image"
            IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -n1)
          fi
          echo "Using image: $IMAGE"
          # Try CLI help first
          docker run --rm $IMAGE --help || (
            docker run -d --name comps-smoke -p 8080:8000 $IMAGE || (echo "failed to start container"; docker images; exit 1)
            sleep 2
            if curl -fsS --max-time 5 http://localhost:8080/; then
              echo "smoke curl ok"
            else
              echo "curl failed, dumping logs:"; docker logs comps-smoke; docker rm -f comps-smoke; exit 1
            fi
            docker rm -f comps-smoke
          )

      # Upload security scan results
      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
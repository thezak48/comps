{% extends "base.html" %}

{% block title %}Login | Comps{% endblock %}

{% block content %}
<div class="container">
    <div class="login-container">
        <h2 class="text-center mb-4 text-light">Login / Register</h2>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username" class="text-light">Username</label>
                <input
                        type="text"
                        class="form-control bg-dark text-light border-secondary"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                />
            </div>
            <div class="form-group">
                <label for="invitation_code" class="text-light">Invitation Code</label>
                <input
                        type="password"
                        class="form-control bg-dark text-light border-secondary"
                        id="invitation_code"
                        name="invitation_code"
                        required
                        autocomplete="current-password"
                />
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary w-100 bg-primary">
                    Login / Register
                </button>
            </div>

            <div class="text-center mt-3">
                <small class="text-light opacity-75">
                    Enter your username and invitation code to login.<br/>
                    If you're new, you'll be registered automatically.
                </small>
            </div>
        </form>
    </div>
</div>
{% endblock %}

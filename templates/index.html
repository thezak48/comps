<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison | Comps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Comps</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fa fa-upload"></i> Upload</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Comps</h1>
        <div class="upload-instructions">
            <p>Select images to be uploaded. Files will be grouped into comparisons based on their names.</p>
        </div>
        <div class="metadata-form">
            <div class="form-group">
                <label for="comparison-name">Comparison Name:</label>
                <input type="text" id="comparison-name" placeholder="Enter a name for this comparison">
            </div>
            <div class="form-group">
                <label for="show-name">Show/Film Name:</label>
                <input type="text" id="show-name" placeholder="Enter show or film name (optional)">
            </div>
            <div class="form-group">
                <label for="tags">Tags:</label>
                <input type="text" id="tags" placeholder="Enter tags separated by commas">
            </div>
        </div>
        <div class="upload-area" id="dropZone">
            <p>Drag and drop images here or click to select files</p>
            <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
        </div>
        <div id="preview"></div>
        <button id="uploadButton" class="btn btn-primary">
            <i class="fa fa-compare"></i> Compare Images
        </button>
    </div>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted">Comps © 2023</span>
                <div class="social-links">
                    <a href="https://github.com/thezak48/comps" class="text-muted">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/upload.js"></script>
</body>
</html>
